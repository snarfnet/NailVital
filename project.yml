name: NailVital
options:
  bundleIdPrefix: com.snarfnet
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Release

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.nailvital
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

targets:
  NailVital:
    type: application
    platform: iOS
    sources:
      - path: NailVital
        excludes:
          - "LaunchScreen.storyboard"
    info:
      path: NailVital/Info.plist
      properties:
        CFBundleDisplayName: "Nail Vital"
        NSCameraUsageDescription: "爪の色を解析し、健康チェックの参考情報を表示するためにカメラを使用します。"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arm64
          - video-camera
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.nailvital
        INFOPLIST_FILE: NailVital/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: 83VGKGSQUH
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": "arm64 x86_64"
    dependencies: []
