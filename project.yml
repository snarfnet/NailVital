name: NailVital
options:
  bundleIdPrefix: com.snarfnet
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Release

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.nailvital
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

targets:
  NailVital:
    type: application
    platform: iOS
    sources:
      - path: NailVital
        excludes:
          - "LaunchScreen.storyboard"
    info:
      path: NailVital/Info.plist
      properties:
        CFBundleDisplayName: "Nailiro Log"
        NSCameraUsageDescription: "Take nail photos and save color notes."
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
          - video-camera
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.nailvital
        INFOPLIST_FILE: NailVital/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: 83VGKGSQUH
        TARGETED_DEVICE_FAMILY: "1,2"
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": "arm64 x86_64"
    dependencies: []
