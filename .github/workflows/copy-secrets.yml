name: Copy secrets to target repo

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g. snarfnet/KajiKajiOkoku)'
        required: true

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
    - name: Copy secrets
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
        DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        echo "$DIST_CERT_BASE64" | gh secret set DIST_CERT_BASE64 --repo ${{ github.event.inputs.target_repo }}
        echo "$DIST_CERT_PASSWORD" | gh secret set DIST_CERT_PASSWORD --repo ${{ github.event.inputs.target_repo }}
        echo "$KEYCHAIN_PASSWORD" | gh secret set KEYCHAIN_PASSWORD --repo ${{ github.event.inputs.target_repo }}
        echo "$ASC_API_KEY_CONTENT" | gh secret set ASC_API_KEY_CONTENT --repo ${{ github.event.inputs.target_repo }}
        echo "Done copying secrets to ${{ github.event.inputs.target_repo }}"
