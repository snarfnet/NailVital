name: Submit App Store Metadata

on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: "Submit for App Review after metadata upload"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyjwt cryptography requests

      - name: Submit metadata, screenshots, and review
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          APP_VERSION: "1.0"
          SUBMIT_FOR_REVIEW: ${{ inputs.submit_for_review == 'true' && '1' || '0' }}
        run: python scripts/submit_appstore_metadata.py
